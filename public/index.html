<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | الطلبات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0b5cff;
            --primary-light: #e6efff;
            --secondary-color: #f8f9fa;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: var(--card-bg);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-md);
            z-index: 10;
        }

        .logo {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo i {
            font-size: 2rem;
        }

        .nav-item {
            padding: 1rem 1.25rem;
            border-radius: 0.75rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-item:hover, .nav-item.active {
            background-color: var(--primary-light);
            color: var(--primary-color);
            transform: translateX(-5px);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 2.5rem 3rem;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--card-bg);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            box-shadow: var(--shadow-sm);
        }

        .user-profile img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background-color: var(--card-bg);
            border-radius: 1.25rem;
            padding: 1.75rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: var(--shadow-md);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
        }

        .stat-icon.primary {
            background-color: var(--primary-light);
            color: var(--primary-color);
        }

        .stat-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .stat-title {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 500;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
        }

        /* Table Section */
        .orders-section {
            background-color: var(--card-bg);
            border-radius: 1.25rem;
            box-shadow: var(--shadow-md);
            overflow-x: auto;
            padding: 1.5rem;
        }

        .orders-header {
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .orders-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .refresh-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: opacity 0.3s;
        }

        .refresh-btn:hover {
            opacity: 0.8;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 0.5rem;
            min-width: 900px;
        }

        th, td {
            padding: 1.25rem 1rem;
            text-align: right;
            vertical-align: middle;
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        td {
            color: var(--text-main);
            background-color: #fafbfc;
            font-weight: 500;
        }
        
        td.address-col {
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        td:first-child {
            border-top-right-radius: 0.75rem;
            border-bottom-right-radius: 0.75rem;
        }

        td:last-child {
            border-top-left-radius: 0.75rem;
            border-bottom-left-radius: 0.75rem;
        }

        tr {
            transition: transform 0.2s;
        }

        tr:hover td {
            background-color: var(--primary-light);
            transform: scale(1.01);
        }

        .status-badge {
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 700;
            display: inline-block;
            white-space: nowrap;
        }

        .status-badge.success {
            background-color: var(--success-light);
            color: var(--success);
        }
        
        .status-badge.pending {
            background-color: var(--warning-light);
            color: var(--warning);
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 0;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        .color-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            background-color: #e2e8f0;
            font-size: 0.85rem;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-bolt"></i>
            هيرو داش
        </div>
        <a href="#" class="nav-item active">
            <i class="fa-solid fa-chart-pie"></i>
            الرئيسية
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-box"></i>
            الطلبات
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-users"></i>
            العملاء
        </a>
        <a href="#" class="nav-item" style="margin-top: auto;">
            <i class="fa-solid fa-gear"></i>
            الإعدادات
        </a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>لوحة المتابعة</h1>
            <div class="user-profile">
                <span style="font-weight: 700; color: var(--text-main);">مرحباً، مدير النظام</span>
                <img src="https://ui-avatars.com/api/?name=Admin&background=0b5cff&color=fff" alt="Admin">
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon primary">
                    <i class="fa-solid fa-shopping-bag"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-title">إجمالي الطلبات</span>
                    <span class="stat-value" id="total-orders">0</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background-color: var(--success-light); color: var(--success);">
                    <i class="fa-solid fa-check-circle"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-title">الطلبات المكتملة</span>
                    <span class="stat-value" id="completed-orders">0</span>
                </div>
            </div>
        </div>

        <div class="orders-section">
            <div class="orders-header">
                <h2>أحدث الطلبات</h2>
                <button class="refresh-btn" onclick="fetchOrders()">
                    <i class="fa-solid fa-rotate-right" id="refresh-icon"></i>
                    تحديث الآن
                </button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>رقم الطلب</th>
                        <th>العميل</th>
                        <th>الموبايل</th>
                        <th>العنوان</th>
                        <th>المنتج</th>
                        <th>اللون</th>
                        <th>التاريخ</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody id="orders-table-body">
                    <!-- Orders will be injected here via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchOrders() {
            const refreshIcon = document.getElementById('refresh-icon');
            refreshIcon.classList.add('fa-spin');
            
            try {
                const response = await fetch('/api/orders');
                const orders = await response.json();
                
                // Update stats
                document.getElementById('total-orders').innerText = orders.length;
                
                const completedCount = orders.filter(o => o.status.includes('مكتمل') || o.status.toLowerCase() === 'delivered' || o.status === 'تم التوصيل').length;
                document.getElementById('completed-orders').innerText = completedCount;

                // Update table
                const tbody = document.getElementById('orders-table-body');
                if (orders.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="8">
                                <div class="empty-state">
                                    <i class="fa-solid fa-inbox"></i>
                                    <p>لا توجد طلبات حالياً، سيتم عرض الطلبات هنا فور وصولها.</p>
                                </div>
                            </td>
                        </tr>
                    `;
                    return;
                }

                tbody.innerHTML = orders.map(order => {
                    const date = new Date(order.createdAt).toLocaleString('ar-EG');
                    
                    let statusClass = 'pending';
                    let displayStatus = order.status;
                    
                    if(displayStatus === 'Pending') displayStatus = 'قيد الانتظار';
                    
                    if (displayStatus.includes('مكتمل') || displayStatus.toLowerCase() === 'delivered' || displayStatus === 'تم التوصيل') {
                        statusClass = 'success';
                    }
                    
                    const colorHtml = order.productColor ? `<span class="color-badge">${order.productColor}</span>` : '<span style="color: #94a3b8;">-</span>';

                    return `
                        <tr>
                            <td style="color: var(--primary-color); font-weight: 700;">#${order.id}</td>
                            <td style="font-weight: 700;">${order.customerName}</td>
                            <td dir="ltr" style="text-align: right;">${order.phoneNumber}</td>
                            <td class="address-col" title="${order.address}">${order.address}</td>
                            <td>${order.product}</td>
                            <td>${colorHtml}</td>
                            <td style="color: var(--text-muted); font-size: 0.9rem;">${date}</td>
                            <td><span class="status-badge ${statusClass}">${displayStatus}</span></td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error fetching orders:', error);
            } finally {
                setTimeout(() => {
                    refreshIcon.classList.remove('fa-spin');
                }, 500);
            }
        }

        // Fetch initially and then every 5 seconds
        fetchOrders();
        setInterval(fetchOrders, 5000);
    </script>
</body>
</html>
